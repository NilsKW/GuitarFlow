<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="40" fill="#0F0F0F"/>
  <rect width="192" height="192" rx="40" fill="url(#g)"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1A1208"/>
      <stop offset="1" stop-color="#0F0F0F"/>
    </linearGradient>
  </defs>

  <!-- "G" — thick ring with a crossbar, mirrored vertically around its own
       center (the one orientation not yet tried) so the opening/crossbar
       face the right way round. Cream keeps it distinct from the amber F
       while staying inside the app's existing palette (same cream used for
       body text throughout the app). -->
  <g transform="translate(0,192) scale(1,-1)">
    <path d="M 72.35 134.6 A 40 40 0 1 1 101.4 102.9"
          fill="none" stroke="#F5EDD6" stroke-width="20" stroke-linecap="round"/>
    <line x1="100" y1="104" x2="64" y2="104" stroke="#F5EDD6" stroke-width="18" stroke-linecap="round"/>
  </g>

  <!-- "F" — the vertical stroke is a guitar neck; its two arms (now equal
       length) each end in a tuning peg (post + rounded knob), standing in
       for the letter's two "branches". -->
  <rect x="122" y="46" width="18" height="100" rx="6" fill="#C8873A"/>

  <!-- Top arm + tuning peg -->
  <rect x="131" y="50" width="32" height="16" rx="8" fill="#C8873A"/>
  <rect x="163" y="54" width="10" height="8" fill="#8D8D9C"/>
  <rect x="171" y="48" width="13" height="20" rx="6" fill="#8D8D9C"/>

  <!-- Middle arm + tuning peg (same length as the top arm) -->
  <rect x="131" y="88" width="32" height="16" rx="8" fill="#C8873A"/>
  <rect x="163" y="92" width="10" height="8" fill="#8D8D9C"/>
  <rect x="171" y="86" width="13" height="20" rx="6" fill="#8D8D9C"/>
</svg>
