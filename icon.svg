<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="40" fill="#0F0F0F"/>
  <rect width="192" height="192" rx="40" fill="url(#g)"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1A1208"/>
      <stop offset="1" stop-color="#0F0F0F"/>
    </linearGradient>
  </defs>
  <!-- Guitar body -->
  <ellipse cx="96" cy="130" rx="38" ry="42" fill="#C8873A" opacity="0.15" stroke="#C8873A" stroke-width="2.5"/>
  <ellipse cx="96" cy="115" rx="28" ry="32" fill="#0F0F0F" stroke="#C8873A" stroke-width="2"/>
  <ellipse cx="96" cy="145" rx="35" ry="38" fill="#0F0F0F" stroke="#C8873A" stroke-width="2"/>
  <!-- Waist -->
  <rect x="70" y="118" width="52" height="14" fill="#0F0F0F"/>
  <!-- Sound hole -->
  <circle cx="96" cy="130" r="12" fill="none" stroke="#C8873A" stroke-width="1.5" opacity="0.6"/>
  <!-- Neck -->
  <rect x="89" y="28" width="14" height="88" rx="5" fill="#C8873A" opacity="0.8"/>
  <!-- Frets -->
  <line x1="89" y1="50" x2="103" y2="50" stroke="#0F0F0F" stroke-width="1.5"/>
  <line x1="89" y1="65" x2="103" y2="65" stroke="#0F0F0F" stroke-width="1.5"/>
  <line x1="89" y1="80" x2="103" y2="80" stroke="#0F0F0F" stroke-width="1.5"/>
  <line x1="89" y1="95" x2="103" y2="95" stroke="#0F0F0F" stroke-width="1.5"/>
  <!-- Headstock -->
  <rect x="85" y="22" width="22" height="16" rx="4" fill="#C8873A"/>
  <!-- Tuners -->
  <circle cx="86" cy="24" r="3" fill="#F5EDD6"/><circle cx="86" cy="34" r="3" fill="#F5EDD6"/>
  <circle cx="106" cy="24" r="3" fill="#F5EDD6"/><circle cx="106" cy="34" r="3" fill="#F5EDD6"/>
  <!-- Strings -->
  <line x1="90" y1="28" x2="90" y2="116" stroke="#F5EDD6" stroke-width="0.8" opacity="0.5"/>
  <line x1="96" y1="28" x2="96" y2="116" stroke="#F5EDD6" stroke-width="0.8" opacity="0.5"/>
  <line x1="102" y1="28" x2="102" y2="116" stroke="#F5EDD6" stroke-width="0.8" opacity="0.5"/>
</svg>